name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scan
        run: bash ./scripts/secret-scan.sh --current --history

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check gofmt
        run: |
          set -euo pipefail
          unformatted=$(find . -name '*.go' -type f -print0 | xargs -0 gofmt -l)
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        env:
          MARK2NOTE_FULL_TESTS: "1"
        run: go test ./...

      - name: Build
        run: bash ./build.sh
