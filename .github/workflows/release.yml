name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Local CI
        run: scripts/ci-local.sh clean

  build:
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: amd64
            suffix: linux-amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SUFFIX: ${{ matrix.suffix }}
        run: |
          set -euo pipefail
          package="mark2note-${SUFFIX}"
          mkdir -p "dist/${package}/configs"
          GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/${package}/mark2note" ./cmd/mark2note
          cp README.md README.zh-CN.md README.en.md LICENSE "dist/${package}/"
          cp configs/config.example.yaml "dist/${package}/configs/config.example.yaml"
          tar -C dist -czf "dist/${package}.tar.gz" "${package}"

      - name: Upload packaged archive
        uses: actions/upload-artifact@v7
        with:
          name: mark2note-${{ matrix.suffix }}
          path: dist/mark2note-${{ matrix.suffix }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && sha256sum mark2note-*.tar.gz > checksums.txt)

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release view "${TAG_NAME}" --repo "${GH_REPO}" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              case "$asset" in
                mark2note-darwin-amd64.tar.gz|mark2note-darwin-arm64.tar.gz|mark2note-linux-amd64.tar.gz|mark2note-linux-arm64.tar.gz|mark2note_Darwin_arm64.tar.gz|mark2note_Darwin_x86_64.tar.gz|mark2note_Linux_arm64.tar.gz|mark2note_Linux_x86_64.tar.gz|checksums.txt)
                  gh release delete-asset "${TAG_NAME}" "$asset" --repo "${GH_REPO}" --yes
                  ;;
              esac
            done
            gh release upload "${TAG_NAME}" dist/* --repo "${GH_REPO}" --clobber
          else
            gh release create "${TAG_NAME}" dist/* --repo "${GH_REPO}" --verify-tag --title "${TAG_NAME}" --generate-notes
          fi
