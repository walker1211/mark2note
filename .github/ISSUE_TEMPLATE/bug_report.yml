name: Bug report
description: Report a reproducible problem in mark2note
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in `mark2note`. Please remove secrets, private Markdown content, local config values, logs with credentials, and generated private notes before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reproducible example you can share publicly.
      placeholder: |
        1. Run `./mark2note ...`
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Paste sanitized output if useful.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: mark2note version
      description: Release version or commit SHA.
      placeholder: v0.1.0 or commit SHA
  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: go version
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS, Linux, Windows
  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Paste only sanitized non-sensitive config snippets. Do not include API keys, tokens, passwords, private document paths, or local secrets.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste sanitized logs or attach screenshots if helpful. Remove secrets and private content first.
