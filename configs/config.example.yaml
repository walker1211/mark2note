output:
  dir: output

ai:
  command: ccs
  args:
    - codex
    - --bare
  retry:
    delays:
      - 1s
      - 2s
      - 5s
      - 9s
      - 17s

deck:
  # deck.theme_mode 可选值：fixed / weekly；weekly 会按本机星期选择 weekly_themes 中的固定主题。
  theme_mode: weekly
  # deck.theme 是 fixed 模式的主题，也是 weekly 当天未配置时的兜底主题。
  # 可选值：default / warm-paper / editorial-cool / tech-noir / plum-ink / red-editorial / sage-mist / fresh-green
  theme: default
  # 单次 deck 允许的最大页数，范围 3-18；默认 12。
  max_pages: 12
  weekly_themes:
    mon: default
    tue: warm-paper
    wed: editorial-cool
    thu: plum-ink
    fri: sage-mist
    sat: fresh-green
    sun: tech-noir
  author: "搁剑听风"
  watermark:
    enabled: true
    text: "walker1211/mark2note"
    position: bottom-right

render:
  viewport:
    width: 1242
    height: 1656
  animated:
    enabled: false
    format: webp
#    format: mp4
    duration_ms: 1200 # 动画时间轴总时长；启用 live 时也会影响 motion.mov 时长
    fps: 8 # 抓帧密度；对 Animated WebP/MP4 有用，也会影响 Live 的采样密度
  import_photos: false # 生成普通 PNG 后导入 Apple Photos；命令行 --import-photos 可覆盖
  import_album: "" # 普通 PNG 导入相册名；留空自动生成 mark2note-photos-<timestamp>
  import_timeout: 2m # 普通 PNG 导入超时，支持 45s / 2m 等 Go duration
  live:
    enabled: false
    photo_format: jpeg
    cover_frame: last # first / middle / last
    assemble: false
    output_dir: apple-live
    import_photos: false # 组装 Live Photo 后导入 Apple Photos；需要 assemble: true
    import_album: "" # Live 导入相册名；留空自动生成 mark2note-live-<timestamp>
    import_timeout: 2m # Live 导入超时，支持 45s / 2m 等 Go duration

xhs:
  publish:
    # publish-xhs 的稳定默认值；命令行可单次覆盖
    account: walker
    headless: false
    browser_path: /Applications/Google Chrome.app/Contents/MacOS/Google Chrome
    profile_dir: ~/.config/mark2note/xhs/profiles/walker
    # mode 控制发布时机/流程，不控制可见性。
    # 可选值：immediate = 普通立即发布流程；schedule = 定时发布流程，需同时设置 schedule_at。
    mode: immediate
    # visibility 控制小红书页面里的可见性选项，不控制发布时机。
    # 可选值：public = 公开可见，保留页面默认公开状态；only-self = 仅自己可见，自动切换可见性下拉。
    visibility: only-self
    # schedule_at 仅在 mode: schedule 时使用；格式 YYYY-MM-DD HH:MM:SS，按 Asia/Shanghai 解析。
    schedule_at: ""
    # 可选：加入已有小红书合集；留空则不选择合集。Optional existing Xiaohongshu collection name.
    collection: ""
    declare_original: true
    # 可选：原创声明内容类型；留空则不选择。当前支持 ai_generated。
    original_declaration_type: ""
    allow_content_copy: false
    topic_generation:
      enabled: true
    # Only auto --publish-xhs uses this. If the Markdown title exceeds max_runes,
    # the configured AI CLI rewrites it; the code validates length but does not truncate.
    title_generation:
      enabled: true
      max_runes: 20
    # Extra Chrome launch args for Xiaohongshu publishing; entries may omit leading "--".
    chrome_args:
      - no-first-run
      - no-default-browser-check
      - disable-background-networking
      - disable-component-update
