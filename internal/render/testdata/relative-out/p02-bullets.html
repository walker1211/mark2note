<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1242,height=1656,initial-scale=1" />
  <style>:root {
  --bg: #F7F3EC;
  --card: #FFFDF9;
  --text: #171717;
  --sub: #5E5A56;
  --accent: #E85B3A;
  --accent-soft: #FDE6DE;
  --accent-foreground: #FFFFFF;
  --inverse-pill-color: #171717;
  --watermark-color: rgba(23, 23, 23, 0.28);
  --line: #E8DED2;
  --panel: #F5EFE6;
  --white: #FFFFFF;
  --cta-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
  --emphasis-color: #D24F2F;
  --number-color: #E85B3A;
  --inline-code-bg: #F5EFE6;
  --inline-code-border: #E2CDBF;
  --inline-code-color: #171717;
  --code-block-bg: #FFF8F1;
  --code-block-border: #E8DED2;
  --code-block-color: #171717;
  --author-color: #5E5A56;
  --author-weight: 600;
  --author-size: 24px;
  --author-bottom-offset: 236px;
}
* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    width: 1242px;
    height: 1656px;
    background: var(--bg);
    font-family: 'Hiragino Sans GB', 'PingFang SC', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
}

.page {
    position: relative;
    width: 1242px;
    height: 1656px;
    overflow: hidden;
    padding: 72px;
}

.watermark {
    position: absolute;
    bottom: 100px;
    z-index: 1;
    font-size: 18px;
    line-height: 1;
    color: var(--watermark-color);
    pointer-events: none;
    user-select: none;
}

.watermark-bottom-right {
    right: 40px;
}

.watermark-bottom-left {
    left: 40px;
}

.pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 56px;
    padding: 0 24px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
}

.pill.inverse {
    background: var(--white);
    color: var(--inverse-pill-color);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
}

.rich-text {
    display: inline;
}

.text-em {
    color: var(--emphasis-color);
    font-weight: 800;
}

.inline-code {
    display: inline-block;
    padding: 0 12px;
    border-radius: 14px;
    border: 1.5px solid var(--inline-code-border);
    background: var(--inline-code-bg);
    color: var(--inline-code-color);
    font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 0.92em;
    line-height: 1.4;
}

.code-block {
    margin: 24px 0 0;
    padding: 24px 28px;
    border-radius: 24px;
    border: 2px solid var(--code-block-border);
    background: var(--code-block-bg);
    color: var(--code-block-color);
    font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 28px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
}

.metric-value {
    color: var(--number-color);
}

.bullet-index.metric-value {
    color: var(--number-color);
}

.step-no.metric-value {
    color: var(--accent-foreground);
}

.compare-cell.right.metric-value {
    color: var(--number-color);
}

.header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.page-badge {
    min-height: 60px;
    padding: 0 28px;
}

.page-counter {
    position: static;
    text-align: right;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.3px;
}

.cta-bar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 200px;
    display: flex;
    justify-content: center;
}

.cover-bottom-stack {
    position: absolute;
    left: 92px;
    right: 92px;
    bottom: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
}

.cover-cta {
    position: static;
    left: auto;
    right: auto;
    bottom: auto;
    width: 100%;
}

.cover-divider {
    position: static;
    width: 100%;
}

.cover-bottom-stack.has-author .cover-divider {
    transform: translateY(-18px);
}

.cover-cta .pill {
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
}

.cover-author {
    position: static;
    width: 439px;
    max-width: 439px;
    transform: none;
    color: var(--author-color);
    font-weight: var(--author-weight);
    text-align: center;
    line-height: 1.2;
    overflow: hidden;
    white-space: nowrap;
}

.cta-bar .pill {
    box-shadow: 0 12px 28px rgba(0, 0, 0, 0.06);
}

.cta-bar.cta-strong .pill {
    min-height: 86px;
    padding: 0 42px;
    border-radius: 24px;
    font-size: 30px;
    font-weight: 800;
    background: var(--accent);
    color: var(--accent-foreground);
    box-shadow: var(--cta-shadow);
}

.title-xl {
    font-size: 92px;
    line-height: 1.15;
    font-weight: 800;
    letter-spacing: -1.2px;
    margin: 120px 0 0;
}

.cover-main {
    position: absolute;
    left: 72px;
    right: 72px;
    top: 176px;
    bottom: 390px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.cover-copy {
    width: 100%;
    max-width: 920px;
    margin: 0 auto;
}

.cover-title {
    margin: 0;
}

.cover-subtitle {
    max-width: 920px;
    margin-left: auto;
    margin-right: auto;
}

.title-lg {
    font-size: 58px;
    line-height: 1.2;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin: 48px 0 0;
}

.title-md {
    font-size: 46px;
    line-height: 1.25;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin: 40px 0 0;
}

.subtitle {
    font-size: 42px;
    line-height: 1.5;
    color: var(--sub);
    margin-top: 56px;
}

.note {
    font-size: 32px;
    line-height: 1.65;
    color: var(--sub);
}

.page-no {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 96px;
    text-align: center;
    font-size: 26px;
    color: var(--sub);
}

.accent-bar {
    position: absolute;
    left: 72px;
    top: 72px;
    width: 12px;
    height: 180px;
    border-radius: 999px;
    background: var(--accent);
}

.divider {
    position: absolute;
    left: 92px;
    right: 92px;
    height: 1.5px;
    background: var(--line);
}

.card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 42px;
    overflow: hidden;
}

.quote-card {
    padding: 60px 56px;
}

.quote-bar {
    width: 10px;
    height: 180px;
    border-radius: 999px;
    background: var(--accent);
}

.quote-wrap {
    display: grid;
    grid-template-columns: 10px 1fr;
    gap: 38px;
    align-items: start;
}

.quote-main {
    font-size: 68px;
    line-height: 1.42;
    font-weight: 800;
    letter-spacing: -0.8px;
}

.tip-box {
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 28px;
    padding: 28px 40px;
    font-size: 34px;
    line-height: 1.45;
    font-weight: 700;
}

.image-frame {
    background: var(--white);
    border: 2px solid var(--line);
    border-radius: 42px;
    padding: 18px;
}

.image-frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 28px;
    display: block;
    background: #fff;
}

.caption {
    margin-top: 34px;
    font-size: 38px;
    line-height: 1.55;
    font-weight: 600;
}

.bullets {
    margin-top: 56px;
    display: grid;
    gap: 28px;
}

.bullet {
    display: grid;
    grid-template-columns: 68px 1fr;
    gap: 22px;
    align-items: start;
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 30px;
    padding: 26px 28px;
}

.bullet-index {
    width: 52px;
    height: 52px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 800;
    margin-top: 6px;
}

.bullet-main {
    font-size: 34px;
    line-height: 1.5;
    font-weight: 700;
}

.compare-head {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 28px;
    margin-top: 34px;
    padding: 0 30px;
}

.compare-head div {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
}

.compare-head .right {
    color: var(--accent);
    font-weight: 800;
}

.compare-rows {
    margin-top: 24px;
    display: grid;
    gap: 20px;
}

.compare-row {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 28px;
    align-items: stretch;
    padding: 28px;
    border-radius: 32px;
    background: var(--card);
    border: 2px solid var(--line);
}

.compare-cell {
    border-radius: 24px;
    padding: 28px 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 28px;
    line-height: 1.45;
    font-weight: 700;
}

.compare-cell.left {
    background: var(--panel);
    color: var(--sub);
}

.compare-cell.right {
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 800;
}

.steps {
    margin-top: 42px;
    display: grid;
    gap: 22px;
}

.steps-only {
    margin-top: 72px;
    gap: 26px;
}

.steps-only .step {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 30px;
    padding: 28px 30px;
}

.step {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 18px;
    align-items: start;
}

.step-no {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    font-size: 24px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 4px;
}

.step-text {
    font-size: 34px;
    line-height: 1.5;
    font-weight: 700;
}

.gallery {
    margin-top: 42px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
}

.gallery-card {
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 30px;
    padding: 16px;
}

.gallery-card img {
    width: 100%;
    height: 460px;
    object-fit: contain;
    border-radius: 18px;
    background: #fff;
    display: block;
}

.gallery-cap {
    margin-top: 16px;
    font-size: 26px;
    line-height: 1.4;
    color: var(--sub);
    text-align: center;
    font-weight: 700;
}

.ending-box {
    margin-top: 160px;
    background: var(--card);
    border: 2px solid var(--line);
    border-radius: 42px;
    padding: 72px 64px;
}

.ending-text {
    font-size: 42px;
    line-height: 1.7;
    color: var(--sub);
}
html, body { width: 1242px; height: 1656px; }
.page { transform-origin: top left; transform: translate(0px, 0px) scale(1.000000); }

body[data-animated="true"] .anim-fade-in,
body[data-animated="true"] .anim-fade-up,
body[data-animated="true"] .anim-scale-in,
body[data-animated="true"] .anim-reveal {
    will-change: opacity, transform;
}
</style>
</head>
<body data-animated="true" data-animated-ms="2400">
  <div class="page">
    <div class="header-row">
      <span class="pill page-badge">第 2 页</span>
      <div class="page-no page-counter">2/3</div>
    </div>
    

    
      <div class="title-lg anim-fade-in"><span class="rich-text">中间</span></div>
      <div class="bullets">
        
        <div class="bullet anim-reveal"><div class="bullet-index metric-value">1</div><div class="bullet-main"><span class="rich-text">要点1</span></div></div>
        
      </div>
      <div class="cta-bar"><span class="pill inverse anim-fade-in"><span class="rich-text">cta2</span></span></div>
    
  </div>
<script>(function () {
  var body = document.body;
  if (!body) {
    return;
  }
  var params = new URLSearchParams(window.location.search);
  var bodyMS = Number(body.getAttribute("data-animated-ms") || "0");
  var queryMS = params.get("animated_ms");
  var animatedMS = queryMS === null ? bodyMS : Number(queryMS);
  if (!Number.isFinite(animatedMS) || animatedMS < 0) {
    animatedMS = 0;
  }
  body.setAttribute("data-animated", "true");
  body.setAttribute("data-animated-ms", String(animatedMS));
  body.setAttribute("data-animated-ready", "true");
  function clamp01(value) {
    if (value <= 0) {
      return 0;
    }
    if (value >= 1) {
      return 1;
    }
    return value;
  }
  function apply(selector, kind) {
    var nodes = document.querySelectorAll(selector);
    var nodeCount = nodes.length;
    var totalMS = bodyMS > 0 ? bodyMS : 1;
    var duration = nodeCount <= 1 ? totalMS : Math.max(Math.round(totalMS / nodeCount), 1);
    nodes.forEach(function (node, index) {
      var stagger = nodeCount <= 1 ? 0 : Math.round(((totalMS - duration) * index) / (nodeCount - 1));
      var progress = clamp01((animatedMS - stagger) / duration);
      node.style.opacity = String(progress);
      if (kind === "fade-up" || kind === "reveal") {
        node.style.transform = "translate3d(0," + ((1 - progress) * 24).toFixed(2) + "px,0)";
        return;
      }
      if (kind === "scale-in") {
        node.style.transform = "scale(" + (0.96 + progress * 0.04).toFixed(4) + ")";
        return;
      }
      node.style.transform = "translate3d(0,0,0)";
    });
  }
  apply(".anim-fade-in", "fade-in");
  apply(".anim-fade-up", "fade-up");
  apply(".anim-scale-in", "scale-in");
  apply(".anim-reveal", "reveal");
})();</script></body>
</html>
